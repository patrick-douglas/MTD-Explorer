site_name: MTD Explorer

site_url: https://patrick-douglas.github.io/MTD-Explorer/

site_description: Joint host transcriptome and microbiome analysis from RNA-seq data

site_author: Patrick Douglas Correa Pereira

repo_name: patrick-douglas/MTD-Explorer

repo_url: https://github.com/patrick-douglas/MTD-Explorer

edit_uri: edit/main/docs/

theme:
  name: material
  language: en

  logo: assets/images/mtd-explorer-mark.svg
  favicon: assets/images/favicon.ico

  icon:
    repo: fontawesome/brands/github

  palette:
    scheme: default
    primary: custom
    accent: custom

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables

  - toc:
      permalink: true

  - pymdownx.details
  - pymdownx.superfences

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.highlight:
      anchor_linenums: true

extra_css:
  - stylesheets/extra.css
  - stylesheets/brand.css

copyright: MTD Explorer · Open-source RNA-seq and metatranscriptomics workflow

extra:
  generator: false

nav:
  - Home: index.md

  - Getting started:
      - System requirements: getting-started/requirements.md
      - Installation: getting-started/installation.md
      - Verify installation: getting-started/verify-installation.md
      - Quick start: getting-started/quick-start.md

  - User guide:
      - Overview: user-guide/index.md
      - Input files: user-guide/input-files.md
      - Analysis modes: user-guide/analysis-modes.md
      - Command-line reference: user-guide/command-line.md
      - Output files: user-guide/output-files.md
      - Taxonomic exploratory outputs: user-guide/taxonomic-exploratory-outputs.md
      - Taxonomic visualizations: user-guide/taxonomic-visualizations.md
      - Host expression outputs: user-guide/host-expression-outputs.md
      - Microbiome comparison outputs: user-guide/microbiome-comparison-outputs.md
      - Functional profiling outputs: user-guide/functional-profiling-outputs.md
      - ssGSEA outputs: user-guide/ssgsea-outputs.md
      - HAllA integration outputs: user-guide/halla-integration-outputs.md
      - Methods and reproducibility outputs: user-guide/methods-reproducibility-outputs.md

  - Reference:
      - Academic references: reference/index.md

  - Troubleshooting:
      - Common problems: troubleshooting/index.md
