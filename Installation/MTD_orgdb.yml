name: MTD_orgdb

channels:
  - conda-forge
  - bioconda

dependencies:
  # ----------------------------------------------------------
  # R and command-line helpers
  # ----------------------------------------------------------
  - r-base=4.5.3
  - jq=1.8.2
  - yq=4.1.1

  # ----------------------------------------------------------
  # Database interfaces
  # ----------------------------------------------------------
  - r-dbi=1.3.0
  - r-rsqlite=3.53.3

  # ----------------------------------------------------------
  # Bioconductor packages required for OrgDb construction
  # ----------------------------------------------------------
  - bioconductor-annotationdbi=1.72.0
  - bioconductor-annotationforge=1.52.0
  - bioconductor-biomart=2.66.1
  - bioconductor-genomeinfodb=1.46.2
  - bioconductor-go.db=3.22.0
