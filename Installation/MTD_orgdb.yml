name: MTD_orgdb

channels:
  - conda-forge
  - bioconda
  - nodefaults

dependencies:
  # ----------------------------------------------------------
  # R generation used by the MTD Explorer DEG environment
  # ----------------------------------------------------------
  - r-base=4.1.2
  - r-biocmanager=1.30.19

  # ----------------------------------------------------------
  # Command-line helpers
  # ----------------------------------------------------------
  - jq=1.8.2
  - yq=4.1.1

  # ----------------------------------------------------------
  # Bioconductor 3.14 packages for OrgDb construction
  # ----------------------------------------------------------
  - bioconductor-annotationdbi=1.56.2
  - bioconductor-annotationforge=1.36.0
  - bioconductor-biomart=2.50.0
  - bioconductor-genomeinfodb=1.30.1
  - bioconductor-go.db=3.14.0
